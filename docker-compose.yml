services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vantage
      POSTGRES_PASSWORD: vantage
      POSTGRES_DB: vantage_earn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantage -d vantage_earn"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://vantage:vantage@postgres:5432/vantage_earn
      JWT_SECRET: change-me-in-production
      RUST_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
