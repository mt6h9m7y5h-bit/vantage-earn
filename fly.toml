# VANTAGE-EARN API auf Fly.io (kostenarm: Maschine schläft bei Inaktivität)
# Vollständige Anleitung: docs/FLY.md
# Schnellstart: ./scripts/deploy-fly.sh

app = 'vantage-earn'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'
  RUST_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '60s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '10s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
