<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VANTAGE-EARN Admin</title>
  <style>
    :root {
      --bg: #0b0f14;
      --card: #141b24;
      --accent: #00d4aa;
      --text: #e8eef5;
      --muted: #8b9cb3;
    }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1rem;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin: 0 0 1rem; }
    .card {
      background: var(--card);
      border: 1px solid #243044;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .row { display: flex; justify-content: space-between; margin: 0.5rem 0; }
    .row span:last-child { color: var(--accent); font-weight: 600; }
    input, button {
      width: 100%;
      padding: 0.75rem;
      border-radius: 10px;
      border: 1px solid #243044;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }
    input { background: #0b0f14; color: var(--text); }
    button {
      background: var(--accent);
      color: #04241c;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    .error { color: #ff6b6b; font-size: 0.9rem; }
    .muted { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>VANTAGE-EARN Admin</h1>
    <p class="muted">Plattform-Kennzahlen — geschützt durch <code>ADMIN_SECRET</code> (Header <code>X-Admin-Secret</code>).</p>

    <div class="card">
      <label for="secret">Admin-Secret</label>
      <input id="secret" type="password" placeholder="ADMIN_SECRET" autocomplete="off" />
      <button onclick="loadStats()">Statistiken laden</button>
      <p id="error" class="error"></p>
    </div>

    <div id="stats" class="card hidden">
      <div class="row"><span>Gesamtumsatz</span><span id="revenue">—</span></div>
      <div class="row"><span>Ausstehende Auszahlungen</span><span id="pending">—</span></div>
      <div class="row"><span>Zurückgehaltene Auszahlungen</span><span id="held">—</span></div>
      <div class="row"><span>Nutzer (geschätzt)</span><span id="users">—</span></div>
      <div class="row"><span>Auszahlungen (7 Tage)</span><span id="payouts">—</span></div>
    </div>
  </div>
  <script>
    const saved = localStorage.getItem('ve_admin_secret');
    if (saved) document.getElementById('secret').value = saved;

    async function loadStats() {
      const secret = document.getElementById('secret').value.trim();
      const err = document.getElementById('error');
      err.textContent = '';
      if (!secret) {
        err.textContent = 'Bitte ADMIN_SECRET eingeben.';
        return;
      }
      try {
        const res = await fetch('/admin/stats', {
          headers: { 'X-Admin-Secret': secret },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          err.textContent = data.error || 'Zugriff verweigert';
          return;
        }
        localStorage.setItem('ve_admin_secret', secret);
        document.getElementById('stats').classList.remove('hidden');
        document.getElementById('revenue').textContent = data.total_revenue + ' USDT';
        document.getElementById('pending').textContent = data.pending_payouts + ' USDT';
        document.getElementById('held').textContent = data.held_payouts + ' USDT';
        document.getElementById('users').textContent = data.user_count;
        document.getElementById('payouts').textContent = data.recent_payout_count;
      } catch {
        err.textContent = 'Server nicht erreichbar.';
      }
    }
  </script>
</body>
</html>
