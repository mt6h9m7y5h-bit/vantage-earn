databases:
  - name: vantage-earn-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: vantage-earn
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RUST_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vantage-earn-db
          property: connectionString
      - key: BITLABS_CALLBACK_BASE_URL
        value: https://vantage-earn.onrender.com
      - key: APP_URL
        value: https://vantage-earn.onrender.com
      - key: EARLY_ADOPTER_BONUS_USDT
        value: "0.5"
      - key: EARLY_ADOPTER_MAX_USERS
        value: "40"
      - key: EARLY_ADOPTER_DAYS
        value: "30"
      # Optional: set to go-live date (YYYY-MM-DD). If omitted, campaign starts at first email signup.
      # - key: EARLY_ADOPTER_START
      #   value: "2026-06-27"
      # Transactional email (Resend HTTP API — no SMTP ports on Render)
      # Set SMTP_PASS in Render Dashboard to your Resend API key (re_…), or use RESEND_API_KEY.
      # Verify domain in Resend, then set SMTP_FROM to your no-reply address.
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: VANTAGE-EARN <noreply@deine-domain.de>
