databases:
  - name: vantage-earn-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: vantage-earn
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RUST_ENV
        value: production
      # Already set in Dashboard — avoid blueprint regeneration conflicts on sync
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vantage-earn-db
          property: connectionString
