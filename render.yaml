databases:
  - name: vantage-earn-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: vantage-earn
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RUST_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vantage-earn-db
          property: connectionString
      - key: BITLABS_CALLBACK_BASE_URL
        value: https://vantage-earn.onrender.com
