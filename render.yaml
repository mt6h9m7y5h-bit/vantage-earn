databases:
  - name: vantage-earn-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: vantage-earn
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RUST_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vantage-earn-db
          property: connectionString
      - key: BITLABS_CALLBACK_BASE_URL
        value: https://vantage-earn.onrender.com
      - key: APP_URL
        value: https://vantage-earn.onrender.com
      - key: EARLY_ADOPTER_BONUS_USDT
        value: "0.5"
      - key: EARLY_ADOPTER_MAX_USERS
        value: "40"
      - key: EARLY_ADOPTER_DAYS
        value: "30"
      # Optional: set to go-live date (YYYY-MM-DD). If omitted, campaign starts at first email signup.
      # - key: EARLY_ADOPTER_START
      #   value: "2026-06-27"
      # Optional SMTP (Resend) — ohne diese Variablen werden Willkommens-E-Mails in Production übersprungen
      # Resend: https://resend.com — SMTP-Relay smtp.resend.com, Port 587, STARTTLS
      # - key: SMTP_HOST
      #   value: smtp.resend.com
      # - key: SMTP_USER
      #   value: resend
      # - key: SMTP_PASS
      #   sync: false
      # - key: SMTP_FROM
      #   value: VANTAGE-EARN <onboarding@deine-domain.de>
