databases:
  - name: vantage-earn-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: vantage-earn
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RUST_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vantage-earn-db
          property: connectionString
      - key: BITLABS_CALLBACK_BASE_URL
        value: https://vantage-earn.onrender.com
      - key: APP_URL
        value: https://vantage-earn.onrender.com
      - key: EARLY_ADOPTER_BONUS_USDT
        value: "0.5"
      - key: EARLY_ADOPTER_MAX_USERS
        value: "40"
      - key: EARLY_ADOPTER_DAYS
        value: "30"
      # Optional: set to go-live date (YYYY-MM-DD). If omitted, campaign starts at first email signup.
      # - key: EARLY_ADOPTER_START
      #   value: "2026-06-27"
      # Transactional email (Resend HTTP API — no SMTP ports on Render)
      # Set SMTP_PASS or RESEND_API_KEY to your Resend API key (re_…).
      # Remove legacy SMTP_HOST/SMTP_USER from Render Dashboard — they trigger timeouts.
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_PASS
        sync: false
      # Required: verified sender on your Resend domain, e.g. VANTAGE-EARN <noreply@yourdomain.de>
      # Test-only (account email only): VANTAGE-EARN <onboarding@resend.dev>
      - key: SMTP_FROM
        sync: false
